{% extends 'base.html' %}

{% block content %}

<div class="card bg-black text-light border-secondary shadow mx-auto" style="max-width: 600px;">
    <div class="card-body text-center">
        <h2 class="mb-3">Delete Task</h2>

        <p>Are you sure you want to delete this task?</p>

        <h5 class="text-danger">{{ task.title }}</h5>

        <form method="POST">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'home' %}" class="btn btn-outline-light">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
